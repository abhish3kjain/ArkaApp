<!DOCTYPE html>
<html>
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <base target="_top">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-gold: #b8860b;
      --bg-warm: #fffdf9;
      --tile-not-started: #e0e0e0; 
      --tile-reading: #fff9c4;     
      --tile-completed: #d1fae5;   
    }
    body { background-color: #f4f1ea; padding: 15px; font-family: 'Segoe UI', sans-serif; }
    /* MAIN CARD */
    .card { max-width: 450px; margin: auto; border: none; border-radius: 15px; background: var(--bg-warm); }
    .header-area { 
      font-family: 'Cinzel', serif;
      font-weight: 500;
      font-size: clamp(0.75rem, 3vw, 1.25rem);
      letter-spacing: 0.4px; /* Essential for this font to breathe */
      text-transform: uppercase;
      background: var(--primary-gold); 
      color: white; 
      padding: 20px; 
      border-radius: 15px 15px 0 0; 
      display: flex; 
      align-items: center; 
      justify-content: flex-start;
      margin-bottom: 0;
      line-height: 1.1;
      white-space: nowrap;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    }
    .logo-container { flex: 0 0 20%; display: flex; justify-content: center; align-items: center; }
    .logo-container img { max-width: 100%; height: auto; max-height: 60px; border-radius: 8px; }
    .text-container { flex: 0 0 80%; text-align: center; padding-right: 10%; }

    /* BINGO GRID */
    .bingo-grid { display: grid; gap: 6px; margin: 20px 0; }
    .tile-container {
      perspective: 1000px;
      width: 100%;
      aspect-ratio: 1 / 1; 
      cursor: pointer;
      position: relative;
    }
    .tile-inner {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }
    .tile-container.flipping .tile-inner { transform: rotateY(180deg); }
    .tile-front, .tile-back {
      position: absolute;
      font-family: 'Lora', serif;
      font-weight: 600; /* slightly bolder for readability */
      top: 0; left: 0;
      width: 100%; height: 100%;
      backface-visibility: hidden;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      padding: 8px;
    }
    .tile-front { border: 1px solid rgba(0,0,0,0.1); color: #2d3436; text-align: center; line-height: 1.1; word-wrap: break-word; }
    .tile-back { background: var(--primary-gold); transform: rotateY(180deg); border: none; }

    /*STATUS COLORS*/
    .status-not-started { background-color: var(--tile-not-started); }
    .status-reading { background-color: var(--tile-reading); border: 2px solid #f1c40f !important; }
    .status-completed { background-color: var(--tile-completed); border: 2px solid #2ecc71 !important; }

    /* Modal Overlay */
    .cue-modal {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 90%; max-width: 350px; background: white; z-index: 1001; border-radius: 20px; padding: 25px;
    }
    .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; cursor: pointer; }
    .active { display: block !important; }
    .loading-spinner { display: none; text-align: center; padding: 20px; }
    .border-top { border-color: rgba(184, 134, 11, 0.1) !important; }

    /* SNAPSHOT MODE (Main Card) */
    .snapshot-mode .tile-inner {
      transform: none !important;
      transform-style: flat !important;
      transition: none !important;
    }
    .snapshot-mode .tile-container {
      perspective: none !important;
    }
    .snapshot-mode #regToggle { display: none !important; }
    .snapshot-mode .text-end.mb-3 { display: none !important; }
    .snapshot-mode .border-top { display: none !important; }
    .snapshot-mode .tile-back { display: none !important; }   

    /* --- LEADERBOARD CSS --- */
    .leader-header {
        background: var(--primary-gold); 
        color: white; 
        padding: 15px; 
        border-radius: 15px 15px 0 0;
        cursor: pointer;
    }
    .leader-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .leader-rank { width: 30px; font-weight: bold; color: var(--primary-gold); text-align: center; font-size: 1.1rem; }
    .leader-info { flex-grow: 1; padding-left: 10px; }
    .leader-name { font-weight: 600; font-size: 0.95rem; color: #444; margin-bottom: 2px; }
    .leader-stats { font-size: 0.75rem; color: #888; }
    
    /* Mini Grid Styling */
    .mini-grid {
      display: grid;
      grid-template-columns: repeat(var(--grid-cols, 4), 1fr);
      gap: 2px;
      width: 60px; /* Compact width */
    }
    .mini-tile {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 2px;
    }
    .mini-gray { background-color: #e0e0e0; }
    .mini-yellow { background-color: #f1c40f; }
    .mini-green { background-color: #2ecc71; }

    /* --- HIDDEN REPORT CANVAS (For Screenshot) --- */
    #hiddenReportCanvas {
        position: fixed; top: -10000px; left: -10000px; /* Hide from view */
        width: 800px; /* Fixed high-res width */
        background-color: #fffdf9;
        padding: 40px;
        font-family: 'Segoe UI', sans-serif;
        border: 10px solid var(--primary-gold);
    }
    .report-header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
    .report-title { color: var(--primary-gold); font-size: 2.5rem; font-weight: bold; margin: 0; }
    .report-date { color: #888; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }
    
    /* Row 1: Top 3 */
    .report-top3 { display: flex; justify-content: center; gap: 40px; margin-bottom: 40px; align-items: flex-end; }
    .report-card-lg { text-align: center; width: 140px; position: relative; }
    .report-card-lg .mini-grid { width: 140px; gap: 4px; margin-bottom: 15px; } /* Bigger grid for winners */
    .report-rank-lg { font-size: 3rem; margin-bottom: 10px; display: block; }
    .report-name-lg { font-weight: bold; font-size: 1.2rem; color: #333; }
    
    /* Row 2+: Rest of players */
    .report-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 30px; }
    .report-card-sm { text-align: center; }
    .report-card-sm .mini-grid { width: 100%; gap: 3px; margin: 0 auto 10px auto; }
    .report-rank-sm { font-weight: bold; color: var(--primary-gold); font-size: 1.1rem; display: block; margin-bottom: 5px; }
    .report-name-sm { font-size: 0.9rem; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  </style>
</head>
<body>

<div class="card shadow-sm" id="mainCard">
  <div class="header-area">
    <div class="logo-container">
      <img src="https://lh3.googleusercontent.com/u/0/d/1O-PceFvQ9rAXZDzzSxSd-5VfA7lWqdp4" alt="Arka Logo">
    </div>
    <div class="text-container">
      <h5 class="mb-0">Arka BOOK BINGO</h5>
      <p class="mb-0 opacity-75 small text-uppercase" style="letter-spacing: 1px;">2026 Edition</p>
    </div>
  </div>

  <div class="card-body p-4 position-relative">
    <div class="text-end mb-3">
      <a href="javascript:void(0)" id="regToggle" onclick="toggleRegistration(true)" class="small text-decoration-none" style="color: var(--primary-gold);">+ Not on the list? Join Challenge</a>
    </div>
    
    <div class="mb-4">
      <select id="nameDropdown" class="form-select" onchange="loadBoard()">
        <option value="">Fetching Members...</option>
      </select>
    </div>

    <div id="registrationArea" style="display:none;" class="p-3 border rounded bg-light mb-4 shadow-sm">
      <label class="form-label fw-bold small">Enter Your Display Name</label>
      <input type="text" id="regNameInput" class="form-control mb-3" placeholder="First & Last Name">
      <div class="d-flex gap-2">
        <button class="btn btn-success w-100 btn-sm fw-bold" onclick="submitRegistration()">Join</button>
        <button class="btn btn-outline-secondary w-100 btn-sm" onclick="toggleRegistration(false)">Cancel</button>
      </div>
    </div>

    <div id="boardContainer" style="display:none;">
      <div id="bingoGrid" class="bingo-grid"></div>
    </div>

    <div id="loader" class="loading-spinner">
      <div class="spinner-border text-warning"></div><br><small>Updating...</small>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-4 pt-3 border-top">
      <a href="javascript:void(0)" onclick="shareToWhatsApp()" class="text-decoration-none d-flex align-items-center" style="color: #25D366; font-size: 0.85rem; font-weight: 600;">
        <span class="me-1">📲</span> Share Progress
      </a>
      <a href="https://drive.google.com/file/d/1473h35plFy_k1O_O-xcNCqS-whREm1Fn/view?usp=sharing" target="_blank" class="text-decoration-none d-flex align-items-center" style="color: var(--primary-gold); font-size: 0.85rem; font-weight: 600;">
        Download PDF <span class="ms-1">📥</span>
      </a>
    </div>
  </div>
</div>

<div style="height: 40px;"></div>

<div class="card shadow-sm" id="leaderboardCard">
  <div class="leader-header d-flex justify-content-between align-items-center" onclick="toggleLeaderboard()" style="cursor: pointer;">
    <div class="d-flex align-items-center flex-grow-1" data-bs-toggle="collapse" data-bs-target="#leaderCollapse" aria-expanded="true" style="cursor: pointer;">
      <span class="me-2">🏆</span>
      <h6 class="mb-0 fw-bold text-uppercase" style="letter-spacing:1px;">Club Leaderboard</h6>
      <span id="leaderArrow" class="ms-2 small opacity-75" style="transition: transform 0.3s;">▼</span>
    </div>
    <button class="btn btn-sm btn-light text-dark fw-bold" style="font-size: 0.8rem;" onclick="event.stopPropagation(); shareLeaderboard()">
      📲 Share
    </button>
  </div>

  <div id="leaderCollapse" style="display: block;">
    <div class="card-body p-3">
      <div id="leaderboardList"></div>
      <div id="leaderLoader" class="text-center py-4">
        <div class="spinner-border spinner-border-sm text-secondary"></div>
        <small class="d-block text-muted mt-2">Loading ranks...</small>
      </div>
    </div>
  </div>

</div>


<div id="hiddenReportCanvas">
    <div class="report-header" style="display: flex; align-items: center; justify-content: center; gap: 30px; border-bottom: 3px solid var(--primary-gold); padding-bottom: 30px; margin-bottom: 40px;">
        
        <img src="https://lh3.googleusercontent.com/u/0/d/1O-PceFvQ9rAXZDzzSxSd-5VfA7lWqdp4" 
          alt="Arka Logo" 
          style="height: 110px; width: auto; border-radius: 12px; box-shadow: 0 4px 12px rgba(184, 134, 11, 0.2);">
        
        <div style="text-align: left;">
             <h1 class="report-title" style="font-family: 'Cinzel', serif; font-weight: 700; color: var(--primary-gold); font-size: 3.2rem; margin: 0; line-height: 1; text-shadow: 1px 1px 0px rgba(0,0,0,0.1);">
                CLUB LEADERBOARD
             </h1>
             <h2 id="reportYearText" style="font-family: 'Cinzel', serif; font-weight: 600; color: #2d3436; font-size: 1.8rem; margin: 8px 0 0 0; letter-spacing: 2px;">
                BOOK BINGO
             </h2>
             <div class="report-date" id="reportDateText" style="color: #636e72; font-family: 'Segoe UI', sans-serif; font-size: 1.1rem; margin-top: 10px; font-weight: 500; text-transform: uppercase;"></div>
        </div>
    </div>
    
    <div class="report-top3" id="reportTop3"></div>
    
    <div class="report-grid" id="reportGridRest"></div>
</div>

<div class="overlay" id="modalOverlay" onclick="closeModal()"></div>
<div class="cue-modal" id="cueModal">
  <h6 id="modalCueText" class="text-center fw-bold mb-4" style="color:var(--primary-gold)"></h6>
  <div class="mb-3">
    <label class="small fw-bold">Book Title</label>
    <input type="text" id="inputBook" class="form-control" oninput="validateStatus()">
  </div>
  <div class="mb-3">
    <label class="small fw-bold">Author Name</label>
    <input type="text" id="inputAuthor" class="form-control" oninput="validateStatus()">
  </div>
  <div class="mb-4">
    <label class="small fw-bold">Status</label>
    <select id="inputStatus" class="form-select">
      <option value="Not Started">Not Started</option>
      <option value="Currently Reading">Currently Reading</option>
      <option value="Completed">Completed</option>
    </select>
  </div>
  <div class="d-flex gap-2">
    <button class="btn btn-dark w-100" onclick="saveUpdate()">Save</button>
    <button class="btn btn-outline-secondary" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
  let currentConfig = { COLS: 4, ROWS: 3 }; 
  let currentUser = "";
  let activeCueId = null;

  function initApp() {
    toggleLoading(true);
    google.script.run
      .withSuccessHandler(data => {
        if (data.config) currentConfig = data.config;
        document.documentElement.style.setProperty('--grid-cols', currentConfig.COLS);
        const drop = document.getElementById('nameDropdown');
        drop.innerHTML = '<option value="">Select Name</option>';
        if (data.names && data.names.length > 0) {
          data.names.forEach(n => drop.innerHTML += `<option value="${n}">${n}</option>`);
        }
        toggleLoading(false);
        loadLeaderboard();  //Once App is ready, Fetch Leaderboard separately (Non-blocking)
      })
      .withFailureHandler(err => {
        alert("Startup Error: " + err);
        toggleLoading(false);
      })
      .getInitialData();
  }

  window.onload = initApp;

  function loadBoard() {
    currentUser = document.getElementById('nameDropdown').value;
    if (!currentUser) {
      document.getElementById('boardContainer').style.display = 'none';
      return;
    }
    toggleLoading(true);
    
    google.script.run.withSuccessHandler(data => {
      const grid = document.getElementById('bingoGrid');
      grid.style.gridTemplateColumns = `repeat(${currentConfig.COLS}, 1fr)`;
      grid.innerHTML = '';
      
      if (!data.grid || data.grid.length === 0) {
        grid.innerHTML = '<div class="p-4 text-center text-muted">No cues found.</div>';
        toggleLoading(false);
        return;
      }

      const longestCue = data.grid.reduce((a, b) => a.cueText.length > b.cueText.length ? a : b);
      //Improve this code based on experience of grid LATER!!
      let universalFontSize = "0.75rem";
      if (longestCue.cueText.length > 50) universalFontSize = "0.5rem";
      else if (longestCue.cueText.length > 30) universalFontSize = "0.6rem";

      data.grid.forEach((item, index) => {
        const tile = document.createElement('div');
        tile.className = 'tile-container';
        tile.id = 'tile-' + item.cueId;
        
        let statusClass = 'status-not-started';
        if(item.status === 'Currently Reading') statusClass = 'status-reading';
        if(item.status === 'Completed') statusClass = 'status-completed';

        tile.innerHTML = `
          <div class="tile-inner">
            <div class="tile-front ${statusClass}" style="font-size: ${universalFontSize}">
              ${item.cueText}
            </div>
            <div class="tile-back"></div>
          </div>
        `;
        tile.onclick = () => handleTileClick(item);
        grid.appendChild(tile);
      });
      
      document.getElementById('boardContainer').style.display = 'block';
      toggleLoading(false);
    }).getMemberStatus(currentUser);
  }
  // --- NEW LEADERBOARD FUNCTION ---
  function loadLeaderboard() {
    google.script.run.withSuccessHandler(data => {
      const list = document.getElementById('leaderboardList');
      const reportTop3 = document.getElementById('reportTop3');
      const reportRest = document.getElementById('reportGridRest');
      
      list.innerHTML = '';          //Clears the vertical list
      reportTop3.innerHTML = '';   // Clears the podium
      reportRest.innerHTML = '';   // Clears the grid

      // Update Date
      const dateOptions = { year: 'numeric', month: 'short', day: 'numeric' };
      document.getElementById('reportDateText').innerText = new Date().toLocaleDateString('en-US', dateOptions);
      // Set the Year Dynamically!
      const yearEl = document.getElementById('reportYearText');
      // If config has YEAR, use it. Otherwise fallback to current date's year.
      const displayYear = currentConfig.YEAR || new Date().getFullYear();
      if(yearEl) yearEl.innerText = `BOOK BINGO ${displayYear}`;

      data.forEach((user, index) => {
        
        const row = document.createElement('div');
        row.className = 'leader-row';

        // Generate Mini Grid HTML
        let miniGridHtml = '<div class="mini-grid">';
        // Ensure we fill 12 spots (4x3) even if data is missing, though backend handles sort
        for(let i=0; i<currentConfig.TOTAL_CUES; i++) {
            let colorClass = 'mini-gray';
            if (user.grid[i]) {
                if(user.grid[i].status === 'Completed') colorClass = 'mini-green';
                else if(user.grid[i].status === 'Currently Reading') colorClass = 'mini-yellow';
            }
            miniGridHtml += `<div class="mini-tile ${colorClass}"></div>`;
        }
        miniGridHtml += '</div>';
        
        // Leaderboard Rank Icons for Top 3
        let rankDisplay = `#${index + 1}`;
        if(index === 0) rankDisplay = '🥇';
        if(index === 1) rankDisplay = '🥈';
        if(index === 2) rankDisplay = '🥉';

        // Define Icon for Report
        let reportRankIcon = (index + 1);
        if(index === 0) reportRankIcon = '🥇';
        if(index === 1) reportRankIcon = '🥈';
        if(index === 2) reportRankIcon = '🥉';

        // Create the Element
        const reportCard = document.createElement('div');
        
        //Update LeaderBoard
        row.innerHTML = `
          <div class="leader-rank">${rankDisplay}</div>
          <div class="leader-info">
            <div class="leader-name">${user.name}</div>
            <div class="leader-stats">${user.completed} Books Completed</div>
          </div>
          ${miniGridHtml}
        `;
        list.appendChild(row);

        //Update Report
        if (index < 3) {
            // TOP 3 LAYOUT (Bigger)
            reportCard.className = 'report-card-lg';
            reportCard.innerHTML = `
                <div class="report-rank-lg">${reportRankIcon}</div>
                ${miniGridHtml}
                <div class="report-name-lg">${user.name}</div>
                <div class="small text-muted">${user.completed} Books</div>
            `;
            reportTop3.appendChild(reportCard);
        } else {
            // REST LAYOUT (Small Grid)
            reportCard.className = 'report-card-sm';
            reportCard.innerHTML = `
                <span class="report-rank-sm">#${index+1}</span>
                ${miniGridHtml}
                <div class="report-name-sm">${user.name}</div>
            `;
            reportRest.appendChild(reportCard);
        }
      });
      document.getElementById('leaderLoader').style.display = 'none';
    }).getLeaderboardData();
  }

  function handleTileClick(item) {
    const container = document.getElementById('tile-' + item.cueId);
    container.classList.add('flipping');
    setTimeout(() => {
      activeCueId = item.cueId;
      document.getElementById('modalCueText').innerText = item.cueText;
      document.getElementById('inputBook').value = item.book;
      document.getElementById('inputAuthor').value = item.author;
      document.getElementById('inputStatus').value = item.status;
      validateStatus();
      document.getElementById('modalOverlay').classList.add('active');
      document.getElementById('cueModal').classList.add('active');
    }, 600);
  }

  function saveUpdate() {
    const book = document.getElementById('inputBook').value;
    const author = document.getElementById('inputAuthor').value;
    const status = document.getElementById('inputStatus').value;
    closeModal();
    toggleLoading(true);
    google.script.run
      .withSuccessHandler(() => {
        if (status === 'Completed') confetti({ particleCount: 100, spread: 70 });
        loadBoard();
        loadLeaderboard();
      })
      .withFailureHandler(err => {
        alert("Error: " + err);
        toggleLoading(false);
      })
      .updateSheet(currentUser, activeCueId, book, author, status);
  }

  function validateStatus() {
    const book = document.getElementById('inputBook').value.trim();
    const author = document.getElementById('inputAuthor').value.trim();
    const statusSelect = document.getElementById('inputStatus');
    const isLocked = (!book || !author);
    statusSelect.options[1].disabled = isLocked;
    statusSelect.options[2].disabled = isLocked;
    if (isLocked && statusSelect.value !== 'Not Started') statusSelect.value = 'Not Started';
  }

  function closeModal() {
    document.querySelectorAll('.tile-container').forEach(t => t.classList.remove('flipping'));
    document.getElementById('modalOverlay').classList.remove('active');
    document.getElementById('cueModal').classList.remove('active');
  }

  function toggleLoading(show) { 
    document.getElementById('loader').style.display = show ? 'block' : 'none'; 
    if(show) setTimeout(() => toggleLoading(false), 10000);
  }

  function toggleRegistration(show) {
    const regArea = document.getElementById('registrationArea');
    const regLink = document.getElementById('regToggle');
    if (show) {
      regArea.style.display = 'block';
      regLink.style.display = 'none';
      document.getElementById('boardContainer').style.display = 'none';
    } else {
      regArea.style.display = 'none';
      regLink.style.display = 'block';
      document.getElementById('regNameInput').value = '';
      initApp();
    }
  }

  function submitRegistration() {
    const newName = document.getElementById('regNameInput').value.trim();
    if (newName.length < 2) { alert("Please enter a valid name."); return; }
    toggleLoading(true);
    google.script.run
      .withSuccessHandler(res => {
        toggleLoading(false);
        alert(res);
        if (!res.includes("Error")) {
          document.getElementById('registrationArea').style.display = 'none';
          document.getElementById('regToggle').style.display = 'block';
          document.getElementById('regNameInput').value = '';
          initApp();
        }
      })
      .withFailureHandler(err => {
        toggleLoading(false);
        alert("Registration failed: " + err);
      })
      .registerNewMember(newName);
  }

  async function shareToWhatsApp() {
    const card = document.getElementById('mainCard');
    const grid = document.getElementById('bingoGrid');
    //Enter "Snapshot Mode" to flatten 3D effects
    card.classList.add('snapshot-mode');
    toggleLoading(false);

    setTimeout(async() => {
      //const card = document.getElementById('mainCard');
      try {
        const canvas = await html2canvas(card, {
          backgroundColor: "#fffdf9",
          scale: 2,
          logging: false,
          useCORS: true,
          ignoreElements: (el) => el.id === 'loader'
        });

        //Exit "Snapshot Mode" immediately after capture
        card.classList.remove('snapshot-mode');
        
        canvas.toBlob(async (blob) => {
          const file = new File([blob], "Arka_Bingo_Progress.png", { type: "image/png" });
          const shareText = `Check out my progress in the Arka Book Bingo ${currentConfig.YEAR}! 📚✨`;
          if (navigator.share && navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file], text: shareText, title: 'Arka Book Bingo' });
          } else {
            const waUrl = `https://wa.me/?text=${encodeURIComponent(shareText)}`;
            window.open(waUrl, '_blank');
          }
          toggleLoading(false);
        }, "image/png");
      } catch (err) {
        console.error("Share failed:", err);
        toggleLoading(false);
      }
    }, 100); //100ms delay 
  }

  // --- NEW SHARE LEADERBOARD FUNCTION ---
  async function shareLeaderboard() {
    const hiddenCanvas = document.getElementById('hiddenReportCanvas');
    // We show a temporary loader just for feedback
    const btn = document.querySelector('.leader-header button');
    const originalText = btn.innerText;
    btn.innerText = 'Generating...';

    try {
      // Capture the HIDDEN element
      const canvas = await html2canvas(hiddenCanvas, { 
          backgroundColor: "#fffdf9", 
          scale: 2, 
          logging: false,
          useCORS: true,       
          allowTaint: true     
      });

      canvas.toBlob(async (blob) => {
          const file = new File([blob], "Arka_Leaderboard.png", { type: "image/png" });
          const shareText = `🏆 Club Leaderboard Update: Arka Book Bingo ${currentConfig.YEAR}!`;
          
          if (navigator.share && navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file], text: shareText, title: 'Leaderboard' });
          } else {
             // If desktop, just download it so they can see it works
             const link = document.createElement('a');
             link.download = 'Leaderboard.png';
             link.href = canvas.toDataURL();
             link.click();
             alert("Leaderboard image downloaded!");
          }
          btn.innerText = originalText;
      }, "image/png");
      
    } catch (err) {
      console.error(err);
      alert("Could not generate report");
      btn.innerText = originalText;
    }
  }


  function toggleLeaderboard() {
    const content = document.getElementById('leaderCollapse');
    const arrow = document.getElementById('leaderArrow');
    
    if (content.style.display === 'none') {
      // OPEN IT
      content.style.display = 'block';
      arrow.style.transform = 'rotate(0deg)'; // Arrow points down
    } else {
      // CLOSE IT
      content.style.display = 'none';
      arrow.style.transform = 'rotate(-90deg)'; // Arrow points left
    }
  }

</script>
