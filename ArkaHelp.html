          <li>📖 Reading status changes (started, finished, DNF)</li>
          <li>📄 Page progress logs</li>
          <li>⭐ Ratings and written reviews</li>

          <li>🎉 Event RSVPs and attendance confirmations</li>
          <li>🎯 Challenge enrolments and completions</li>
        </ul>

        <div class="huk-warn">
          <strong>🔓 Everything you do in the app is visible to all club members.</strong>

          appear in the Home feed and on your public profile. There is no private shelf mode.
        </div>

        <h3>What Does the Feed Look Like When You're New?</h3>
        <p>
          When you first join, the feed shows the rest of the club's activity — so you'll
          see other members' reading even before you've logged your first book. Once you
          start shelving and logging, your own activity cards will appear alongside theirs.
        </p>

        <h3>Announcements Banner</h3>
        <p>
          Pinned announcements from the admin appear at the top of the feed inside a yellow
          card. They stay visible until an admin removes them. Non-pinned notices can be
          dismissed by tapping the <strong>✕</strong> button — they reappear the next time
          you reload the app.
        </p>

        <h3>The Sync Button</h3>
        <p>
          The feed does not auto-refresh while you are reading it. Tap the
          <strong>Sync</strong> button at the top of the Home view to fetch the latest
          activity from the server.
        </p>

        <div class="huk-tip">
          <strong>💡 Feed grouping:</strong> The app groups related activity into single
          cards. If you finish a book and rate it on the same day, one combined card appears
          — not two. This keeps the feed clean and readable.
        </div>

        <h3>Tapping Feed Cards</h3>
        <p>
          Tap a <strong>book cover</strong> on any feed card to open that book's detail page.
          Tap a <strong>member's name or avatar</strong> to open their profile.
        </p>

        <p>

        </p>

        <h3>Joining a Challenge</h3>
        <div class="huk-step-box">
          <div class="huk-step-number">1</div>
          <div>Open the <strong>Challenges</strong> section from the side drawer.</div>
        </div>
        <div class="huk-step-box">

        </div>

        <div class="huk-success">
          <strong>Joining CP:</strong> Set per-challenge by the admin. The default when creating
          is 100 ☀️, but check the challenge detail page for the actual amount.
        </div>

        <h3>Tracking Progress</h3>
        <p>
          Progress is tracked automatically based on your shelf activity for most challenge
          types. For Bingo Grid challenges, you link books to cells manually. Your progress
          bar appears on both the challenge detail page and the My Challenges card on the
          Me tab.
        </p>
        <p>
          You can see how other enrolled members are doing on the challenge's detail page —
          the enrolled member list shows everyone currently active.
        </p>

        <h3>Completing a Challenge</h3>
        <p>
          When you meet the criteria, the app automatically upgrades your status:
        </p>
        <ul>
          <li>🥇 <strong>Winner</strong> — met the top win condition.</li>
          <li>🎖️ <strong>Finisher</strong> — met the completion condition (below Winner).</li>
        </ul>
        <p>A toast notification confirms the achievement and your CP are awarded instantly.</p>

        <h3>What Happens When a Challenge Ends?</h3>
        <p>
          When a challenge's end date passes, active enrollments are moved to a completed
          or archived state. If you were still in <strong>Active</strong> status when it
          ended (did not reach Finisher or Winner), no finish or win CP are awarded — only
          the enrol CP you received when you joined.

      content: `
        <p>
          If something is not working as expected, try the steps below before submitting
          a bug report. Most issues are solved by a simple refresh.
        </p>

        <h3>Issue 1 — The App Won't Load / Shows a Blank Screen</h3>
        <div class="huk-step-box">
          <div class="huk-step-number">1</div>
          <div>Hard-refresh the page: <strong>Ctrl + Shift + R</strong> on desktop,
          or close and reopen on mobile.</div>
        </div>
        <div class="huk-step-box">
          <div class="huk-step-number">2</div>
          <div>Check your internet connection — the app requires a live connection to
          Google's servers on every load.</div>
        </div>
        <div class="huk-step-box">
          <div class="huk-step-number">3</div>
          <div>Make sure you are signed into the correct Google account (the one you
          registered with, or your linked alternate Gmail).</div>
        </div>
        <div class="huk-step-box">
          <div class="huk-step-number">4</div>
          <div>If it still fails, check whether Google Apps Script is experiencing
          an outage at <strong>status.google.com</strong>.</div>
        </div>

        <h3>Issue 2 — My Points Didn't Update After I Logged Pages</h3>
        <p>
          Points are awarded immediately when you save a shelf update or log progress.
          If they look wrong:
        </p>
        <ul>
          <li>Your Club Points total on the Me tab is recalculated every night
          automatically. The live number may differ slightly from the nightly total —
          this resolves on its own by morning.</li>
          <li>If you entered a page count <em>lower</em> than your previous saved total,
          zero points are awarded (this is a correction, not a new reading session).
          See the Shelving — Part 2 article for how pages are calculated.</li>
        </ul>

        <h3>Issue 3 — My Level Didn't Change Even Though I Have Enough Points</h3>
        <p>
          Level names on your profile update from the nightly sync, even though points
          are awarded in real time. If you just crossed a threshold, your level name may
          show correctly after the next page reload. If it still seems wrong after 24 hours,
          submit a bug report.
        </p>

        <h3>Issue 4 — The Home Feed Is Empty</h3>
        <p>
          The feed does not auto-refresh. Tap the <strong>Sync</strong> button at the top
          of the Home view to fetch the latest activity. If the feed is still empty after
          syncing, the club may genuinely have no new activity in the last period —
          or you may be the first person to open the app today!
        </p>

        <h3>Issue 5 — My Challenge Progress Is Missing</h3>
        <p>
          Progress for most challenges is calculated from your shelf activity. If a book
          you finished is not counting toward your challenge:
        </p>
        <ul>
          <li>Confirm the book is marked as <span class="huk-badge huk-badge--finished">🏆 Finished</span>
          on your shelf (not still Reading).</li>
          <li>For Bingo Grid challenges, you must manually link a book to each cell —
          finishing the book on your shelf does not automatically complete a cell.</li>
          <li>For Buddy Read challenges, log your pages — progress is tracked by page
          count, not by Finished status.</li>
        </ul>

        <div class="huk-tip">
          <strong>Still stuck?</strong> Use the feedback form (side drawer → Send Feedback)
          to report the issue. Describe exactly what you were doing and what you expected
          to happen. That earns you <span class="huk-cp-pill">+150 ☀️ CP</span> too.
